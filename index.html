<!DOCTYPE html>
<html lang="ru" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Telegram &amp; Способ доставки</title>
    <meta name="theme-color" content="#000000"/>
    <script src="https://telegram.org/js/telegram-web-app.js"></script><!--Подключаем скрипт от телеграм-->
    <script>window.Telegram.WebApp.ready()</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Titillium+Web:400,700'><link rel="stylesheet" href="./style.css">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/suggestions-jquery@latest/dist/js/jquery.suggestions.min.js'></script>
    <script src="https://snipp.ru/cdn/maskedinput/jquery.maskedinput.min.js"></script>

</head>
<body>
    <form action='' class='form' id="add-from" onsubmit="return false">

        <div class="field">
                <label class='label required'>Способ доставки</label>
                <input class='option-input' id='option-0' name='option' type='radio' required="" value='delivery'>
                <label class='option-label' for='option-0'>Доставка</label>
                <input class='option-input' id='option-1' name='option' type='radio' required="" value='pickup'>
                <label class='option-label' for='option-1'>Заберу сам</label>

            <div class="delivery l-1">
                <div class="container">
                        <p class="required">
                            <label class="label" for="name">Куда</label>
                            <div class="row no-gutters">
                                <div class="col-8 col-md-4">
                                    <input class="text-input" id="street" name="street" onkeyup="checkParams()" placeholder="Улицу*" required="" type="text" value="">
                                </div>
                                <div class="col-4 col-md-4">
                                    <input class="text-input" id="house" name="house" onkeyup="checkParams()" placeholder="Дома*" required=""  type="text" value="">
                                </div>
                            </div>
                        </p>
                </div>

                <div class="container">
                    <div class="row field half">
                            <div class="col">
                                <input class="text-input half" id="flat" name="name" placeholder="Кв./офис" type="text" value="">
                            </div>
                        <div class="col">
                                <input class="text-input" id="floor" name="name" placeholder="Этаж" type="text" value="">
                            </div>
                    </div>
                </div>
                <div class="container">
                    <div class="row field half">
                        <div class="col">
                                <input class="text-input" id="entrance" name="name" placeholder="Подъезд"  type="text" value="">
                            </div>
                        <div class="col">
                                <input class="text-input" id="intercom" name="name" placeholder="Домофон" type="text" value="">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <p class='field required half'>
            <input class='text-input mask-phone' id='phone' name='phone' onkeyup="checkParams()" placeholder="Номер телефона*"  required="" type='tel'>
        </p>
        <p class='field'>
            <textarea class='textarea' cols='50' id='about' name='about' placeholder="Комментарий к заказу" rows='4'></textarea>
        </p>
    </form>
    <script src='app.js'></script>
</body>
</html>
