<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Telegram &amp; Способ доставки</title>

<form action='' class='form'>
    <div class='field required'>
    <label class='label'>Способ доставки</label>

      <li class='option'>
        <input class='option-input' id='option-0' name='option' type='radio' value='0'>

      </li>
      <li class='option'>
        <input class='option-input' id='option-1' name='option' type='radio' value='1'>

      </li>
    </ul>
  </div>

  <div class="container">
      <div class="row">
        <p class="field required">
          <label class="label required" for="name">Улица</label>
          <input class="text-input" id="address" name="address" placeholder="Введите улицу" required="" ="ss" type="text" value="">
        </p>
      </div>
  </div>

   <div class="container">
    <div class="row">
      <div class="col-sm">
        <p class="field required">
          <label class="label required" for="name">Кв./офис</label>
          <input class="text-input" id="name" name="name" required="" type="text" value="">
        </p>

        <p class="field required">
            <label class="label required" for="name">Этаж</label>
            <input class="text-input" id="name" name="name" required="" type="text" value="">
        </p>



      </div>
      <div class="col-sm">
        <p class="field required">
          <label class="label required" for="name">Подъезд</label>
          <input class="text-input" id="name" name="name" required="" type="text" value="">
        </p>
         <p class="field required">
          <label class="label required" for="name">Домофон</label>
          <input class="text-input" id="name" name="name" required="" type="text" value="">
        </p>

      </div>
    </div>
  </div>

  <p class='field required half'>
    <label class='label' for='phone'>Телефон</label>
    <input class='text-input' id='phone' name='phone' type='phone'>
  </p>
  <p class='field'>
    <label class='label' for='about'>Комментарий к заказу</label>
    <textarea class='textarea' cols='50' id='about' name='about' rows='4'></textarea>
  </p>

  <p class='field half'>
    <input class='button' type='submit' value='Send'>
  </p>
</form>
