<!DOCTYPE html>
<html lang="ru" >
<head>
  <meta charset="UTF-8">
  <title>Telegram &amp; Способ доставки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script> <!--Подключаем скрипт от телеграм-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Titillium+Web:400,700'><link rel="stylesheet" href="./style.css">
  <style>
    @subtext-color: #777;
    @suggestions-bg-color: #fff;
    @subtext-label-color: #f5f5f5;

    .box-sizing(@sizing: border-box) {
        -ms-box-sizing: @sizing;
        -moz-box-sizing: @sizing;
        -webkit-box-sizing: @sizing;
        box-sizing: @sizing;
    }

    .rounded(@radius) {
        -webkit-border-radius: @radius;
        -moz-border-radius: @radius;
        border-radius: @radius;
    }

    .suggestions-nowrap {
        white-space: nowrap;
    }

    /**
     * Основной INPUT
     */
    .suggestions-input {
        // IE9 can't determine border-style until it is specified in stylesheets
        //  border: 1px solid grey;
        .box-sizing();
        width: 100%;

        &::-ms-clear {
            display: none;
        }
    }

    .suggestions-wrapper {
        position: relative;
        margin: 0;
        padding: 0;
        vertical-align: top;

        //Prevent font scaling in landscape while allowing user zoom
        -webkit-text-size-adjust: 100%;
    }

    /**
     * Выпадающий блок с найденными подсказками
     */
    .suggestions-suggestions {
        background: @suggestions-bg-color;
        border: 1px solid #999;
        .box-sizing;
        cursor: default;
        color: white;
        left: 0;
        min-width: 100%;
        position: static;
        z-index: 9999;

        //Prevent font scaling in landscape while allowing user zoom
        -webkit-text-size-adjust: 100%;

        strong {
            font-weight: normal;
            color: #3399ff;
        }

        &.suggestions-mobile {
            border-style: none;

            .suggestions-suggestion {
                border-bottom: 1px solid #ddd;
            }
        }
    }

    /**
     * Контейнер для одной подсказки
     */
    .suggestions-suggestion {
        padding: 4px 4px;
        overflow: hidden;

        &:hover {
            background: darken(@suggestions-bg-color, 3%);
        }
    }

    /**
     * Выбранная (активная) подсказка
     */
    .suggestions-selected {
        background: darken(@suggestions-bg-color, 6%);

        &:hover {
            background: darken(@suggestions-bg-color, 6%);
        }
    }

    /**
     * Информационный блок в верхней части выпадашки с подсказками
     */
    .suggestions-hint {
        padding: 4px 4px;
        white-space: nowrap;
        overflow: hidden;
        color: @subtext-color;
        font-size: 85%;
        line-height: 20px;
    }

    /**
     * Дополнительный текст в подсказке, который идет второй строкой
     */
    .suggestions-subtext {
        color: @subtext-color;
    }

    /**
     * Размещает дополнительный текст в одну строку с основным текстом подсказки
     */
    .suggestions-subtext_inline {
        display: inline-block;
        min-width: 6em;
        vertical-align: bottom;
        margin: 0 0.5em 0 0;
    }

    /**
     * Разделитель нескольких дополнительных текстов
     */
    .suggestions-subtext-delimiter {
        display: inline-block;
        width: 2px;
    }

    /**
     * Выделяет подсказку
     */
    .suggestions-subtext_label {
        margin: 0 0 0 0.25em;
        .rounded(3px);
        padding: 0 3px;

        background: @subtext-label-color;
        font-size: 85%;
    }

    .suggestions-value {
        &[data-suggestion-status="LIQUIDATED"] {
            position: relative;

            &:after {
                position: absolute;
                left: 0;
                right: 0;
                top: 50%;

                border-top: 1px solid rgba(0, 0, 0, 0.4);

                content: "";
            }
        }
    }

    /**
     * Промо-блок
     */
    .suggestions-promo {
        font-size: 85%;
        display: none;
        color: @subtext-color;
        padding: 4px;
        text-align: center;
        a {
            color: @subtext-color;
            display: block;
            filter: grayscale(100%);
            line-height: 20px;
            text-decoration: none;
        }
        a:hover {
            filter: grayscale(0);
        }
        svg {
            height: 20px;
            vertical-align: bottom;
        }
    }

    @media screen and (min-width: 600px) {
        .suggestions-promo {
            position: absolute;
            top: 0;
            right: 0;
            text-align: left;
        }
    }

</style>
</head>
<body>



<!-- partial:index.partial.html -->
<form action='' class='form'>
    <div class='field required'>
    <label class='label'>Способ доставки</label>
    <ul class='options'>
      <li class='option'>
        <input class='option-input' id='option-0' name='option' type='radio' required="" value='0'>
        <label class='option-label' for='option-0'>Доставка</label>
      </li>
      <li class='option'>
        <input class='option-input' id='option-1' name='option' type='radio' required="" value='1'>
        <label class='option-label' for='option-1'>Заберу сам</label>
      </li>
    </ul>
  </div>

  <div class="container">
      <div class="row">
        <p class="field required">
          <label class="label required" for="name">Улица</label>
          <input class="text-input" id="street" name="street" placeholder="Введите улицу" required="Введите улицу" type="text" value="">
        </p>
          <p class="field required">
          <label class="label required" for="name">Дом</label>
          <input class="text-input" id="house" name="house" placeholder="Введите номер дома" required=""  type="text" value="">
        </p>
      </div>
  </div>

   <div class="container">
    <div class="row">
      <div class="col-sm">
        <p class="field">
          <label class="label required" for="name">Кв./офис</label>
          <input class="text-input" id="flat" name="name" required="" type="text" value="">
        </p>

        <p class="field ">
            <label class="label required" for="name">Этаж</label>
            <input class="text-input" id="floor" name="name" required="" type="text" value="">
        </p>
      </div>
      <div class="col-sm">
        <p class="field ">
          <label class="label required" for="name">Подъезд</label>
          <input class="text-input" id="entrance" name="name" required="" type="text" value="">
        </p>
         <p class="field ">
          <label class="label required" for="name">Домофон</label>
          <input class="text-input" id="intercom" name="name" required="" type="text" value="">
        </p>

      </div>
    </div>
  </div>

  <p class='field required half'>
    <label class='label' for='phone'>Телефон</label>
    <input class='text-input' id='phone' name='phone' type='tel'>
  </p>
  <p class='field'>
    <label class='label' for='about'>Комментарий к заказу</label>
    <textarea class='textarea' cols='50' id='about' name='about' rows='4'></textarea>
  </p>

  <p class='field half'>
    <input class='button' type='submit' value='Send'>
  </p>

</form>
<!-- partial -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/suggestions-jquery@latest/dist/js/jquery.suggestions.min.js'></script>


<script>

      bounds: "house",

    //street - Улица

    //floor - Этаж

    let street = document.getElementById("street").value;

    let test_json = document.getElementsByTagName("submit");

    console.log(test_json)

    Telegram.WebApp.onEvent('mainButtonClicked', function(){

        const data = {

    });
</script>

</html>
